<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vura · Mapa (modulo standalone)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<link rel="stylesheet" href="./map.css">

<style>
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', system-ui, sans-serif; }
    #map { position: fixed; inset: 0; }

    #harness-panel {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 1000;
        background: var(--surface-solid);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 14px 16px;
        max-width: 300px;
        color: var(--text);
        box-shadow: var(--shadow-xl);
        font-size: 0.82rem;
    }
    #harness-panel h1 { font-size: 0.95rem; margin: 0 0 8px; }
    #harness-panel p { color: var(--text-secondary); margin: 0 0 10px; line-height: 1.4; }
    #harness-panel button {
        display: block;
        width: 100%;
        margin-bottom: 6px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        font-size: 0.78rem;
        text-align: left;
    }
    #harness-panel button:hover { background: rgba(255,255,255,0.08); }
    #harness-panel button.active { border-color: var(--primary); color: var(--primary); }

    #harness-toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surface-solid);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 16px;
        border-radius: var(--r-full);
        font-size: 0.8rem;
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
    }
    #harness-toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="map"></div>

<div id="harness-panel">
    <h1>🗺️ Mapa VURA — modulo standalone</h1>
    <p>Esto NO es la app completa: es solo el mapa, aislado, con datos falsos.
       Sirve para depurar o mejorar el mapa sin arrancar Firebase/login/etc.
       Los cambios que hagas en <code>map.js</code> / <code>map.css</code> se
       ven aqui igual que en la app real (son los mismos archivos).</p>
    <button id="btnSelectDemo301">Seleccionar "Autobús 301 (demo)"</button>
    <button id="btnSelectNone">Deseleccionar empresa</button>
    <button id="btnToggleSim" class="active">⏸️ Pausar simulacion de vehiculos</button>
</div>

<div id="harness-toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.22/leaflet-maplibre-gl.js"></script>

<script src="./utils.js"></script>
<script src="./map.js"></script>
<script src="./mock-data.js"></script>

<script>
    // ------------------------------------------------------------------
    // Estado global que mapa/map.js espera encontrar. En la app principal
    // estas variables viven en index.html; aqui las declaramos igual para
    // que map.js corra sin modificaciones.
    // ------------------------------------------------------------------
    let map = null;
    let companies = MOCK_COMPANIES;
    let liveVehicles = {};
    let vehicleMarkers = {};
    let routePolylines = {};
    let vehicleLastKnownPos = {};
    let selectedCompanyId = null;

    function showToast(msg, type) {
        const el = document.getElementById('harness-toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    // Panel de detalle del vehiculo: en la app real abre un bottom-sheet
    // (ver passenger.js). Aqui solo mostramos un toast para no reimplementar
    // esa UI dentro del harness.
    function showVehiclePanel(companyId, vehicleId) {
        const company = companies[companyId];
        const plate = company?.vehicles?.[vehicleId]?.plate || vehicleId;
        showToast('Click en vehiculo: ' + plate, 'info');
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ------------------------------------------------------------------
    // Arranque
    // ------------------------------------------------------------------
    initMap();

    Object.keys(companies).forEach(id => showRoute(id, companies[id]));

    window.mockSimPaused = false;
    startMockSimulation();

    document.getElementById('btnSelectDemo301').addEventListener('click', () => {
        selectedCompanyId = 'ruta_demo_301';
        Object.keys(companies).forEach(id => showRoute(id, companies[id]));
        const bounds = getRouteBoundsForCompany('ruta_demo_301');
        if (bounds) map.fitBounds(bounds, { padding: [60, 60] });
        showToast('Empresa seleccionada: Autobús 301 (demo)', 'success');
    });

    document.getElementById('btnSelectNone').addEventListener('click', () => {
        selectedCompanyId = null;
        Object.keys(companies).forEach(id => showRoute(id, companies[id]));
        showToast('Empresa deseleccionada', 'success');
    });

    document.getElementById('btnToggleSim').addEventListener('click', (e) => {
        window.mockSimPaused = !window.mockSimPaused;
        e.target.textContent = window.mockSimPaused ? '▶️ Reanudar simulacion de vehiculos' : '⏸️ Pausar simulacion de vehiculos';
        e.target.classList.toggle('active', !window.mockSimPaused);
    });
</script>

</body>
</html>
